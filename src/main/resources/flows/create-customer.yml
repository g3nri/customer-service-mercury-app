flow:
  id: 'create-customer'
  description: 'Create customer flow'
  ttl: 10s

first.task: 'customer.create'

tasks:
  - input:
      - 'input.body.name -> name'
      - 'input.body.email -> email'
    process: 'customer.create'
    output:
      - 'result -> output.body'
    description: 'Create customer'
    execution: end