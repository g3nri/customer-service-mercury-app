flow:
  id: 'create-customer'
  description: 'Create customer flow'
  ttl: 10s
  exception: 'v1.error.handler'

first.task: 'v1.validate.customer'

tasks:
  - input:
      - 'input.body.name -> name'
      - 'input.body.email -> email'
    process: 'v1.validate.customer'
    output:
      - 'result.name -> model.name'
      - 'result.email -> model.email'
    description: 'Validate customer input'
    execution: 'sequential'
    next:
      - 'v1.check.customer.email'

  - input:
      - 'model.email -> email'
    process: 'v1.check.customer.email'
    output:
      - 'result.email -> model.email'
    description: 'Check customer email uniqueness'
    execution: 'sequential'
    next:
      - 'v1.create.customer'

  - input:
      - 'model.name -> name'
      - 'model.email -> email'
    process: 'v1.create.customer'
    output:
      - 'result.id -> model.id'
      - 'result.name -> model.name'
      - 'result.email -> model.email'
    description: 'Save customer'
    execution: 'sequential'
    next:
      - 'v1.customer.response'

  - input:
      - 'model.id -> id'
      - 'model.name -> name'
      - 'model.email -> email'
    process: 'v1.customer.response'
    output:
      - 'result -> output.body'
      - 'int(201) -> output.status'
    description: 'Build response'
    execution: 'end'

  - input:
      - 'error.code -> status'
      - 'error.message -> message'
      - 'error.stack -> stack'
    process: 'v1.error.handler'
    output:
      - 'result.status -> output.status'
      - 'result -> output.body'
    description: 'Handle errors'
    execution: 'end'
