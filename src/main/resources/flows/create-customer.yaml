flow:
  id: 'create-customer'
  description: 'Create customer flow'
  ttl: 10s

first.task: 'customer.validate'

tasks:
  - input:
      - 'input.body.name -> name'
      - 'input.body.email -> email'
    process: 'customer.validate'
    output:
      - 'result.name -> model.name'
      - 'result.email -> model.email'
    description: 'Validate customer input'
    execution: 'sequential'
    next:
      - 'customer.check.email'

  - input:
      - 'model.email -> email'
    process: 'customer.check.email'
    output:
      - 'result.email -> model.email'
      - 'result.exists -> model.emailExists'
    description: 'Check customer email'
    execution: 'sequential'
    next:
      - 'customer.route.by.email'

  - input:
      - 'model.emailExists -> exists'
    process: 'customer.route.by.email'
    output:
      - 'result -> decision'
    description: 'Route by email existence'
    execution: 'decision'
    next:
      - 'customer.duplicate.error'
      - 'customer.create'

  - input:
      - 'model.email -> email'
    process: 'customer.duplicate.error'
    output:
      - 'result -> output.body'
      - 'int(400) -> output.status'
    description: 'Duplicate email error'
    execution: 'end'

  - input:
      - 'model.name -> name'
      - 'model.email -> email'
    process: 'customer.create'
    output:
      - 'result.id -> model.id'
      - 'result.name -> model.name'
      - 'result.email -> model.email'
    description: 'Save customer'
    execution: 'sequential'
    next:
      - 'customer.response'

  - input:
      - 'model.id -> id'
      - 'model.name -> name'
      - 'model.email -> email'
    process: 'customer.response'
    output:
      - 'result -> output.body'
      - 'int(201) -> output.status'
    description: 'Build response'
    execution: 'end'