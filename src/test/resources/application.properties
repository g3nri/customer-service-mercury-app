application.name=customer-service-mercury-app
info.app.description=Customer service unit tests

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

rest.server.port=8083
server.port=8085
rest.automation=true

web.component.scan=com.deviceshop.customer
snake.case.serialization=true

yaml.rest.automation=classpath:/rest.yaml
yaml.flow.automation=classpath:/flows.yaml

cloud.connector=none
